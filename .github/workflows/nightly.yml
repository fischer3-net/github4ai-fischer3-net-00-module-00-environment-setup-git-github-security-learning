# ============================================================
# Nightly Integration Tests
# ============================================================
#
# MODULE 05 TEACHING REFERENCE — Advanced Triggers
# This workflow demonstrates scheduled workflows and
# end-to-end integration testing of the A2A system.
#
# Unlike the CI workflow (which runs unit tests on every PR),
# this workflow starts the full Orchestrator + all Specialist
# Agents and tests them together as a running system.
#
# Why nightly instead of every PR?
#   Integration tests are slow (spin-up time, real HTTP calls)
#   and occasionally flaky (network conditions, timing).
#   Running them nightly catches regressions without slowing
#   down the PR review cycle.
#
# When it runs:
#   - Every night at 02:00 UTC (using cron syntax)
#   - On pushes to main that touch the starter project
#   - Manually via workflow_dispatch
# ============================================================

name: Nightly Integration Tests

on:
  # Cron syntax: minute hour day-of-month month day-of-week
  # This runs at 02:00 UTC every night.
  # Use https://crontab.guru to build and verify cron expressions.
  schedule:
    - cron: "0 2 * * *"

  push:
    branches:
      - main
    paths:
      - "starter-project/**"
      - ".github/workflows/nightly.yml"

  workflow_dispatch:
    # Allow manual runs with a custom input to target a specific agent
    inputs:
      target_agent:
        description: "Run tests for a specific agent only (leave blank for all)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  # Allow the workflow to create issues when nightly tests fail,
  # so maintainers get automatic failure notifications.
  issues: write

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1: Integration Tests — Python
  # Starts the full Python A2A stack and runs end-to-end tests.
  # ──────────────────────────────────────────────────────────
  integration-python:
    name: Integration Tests (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 20   # Kill the job if it hangs — never let CI run forever

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: starter-project/python/requirements.txt

      - name: Install dependencies
        working-directory: starter-project/python
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Start the A2A system in the background
        working-directory: starter-project/python
        run: |
          # Start Orchestrator and all agents as background processes.
          # Each writes its logs to a file we can inspect on failure.
          python orchestrator/main.py > /tmp/orchestrator.log 2>&1 &
          python agents/echo/main.py  > /tmp/agent-echo.log  2>&1 &
          python agents/search/main.py > /tmp/agent-search.log 2>&1 &

          # Give the services a moment to start up before tests hit them
          echo "Waiting for services to start..."
          sleep 5
        env:
          # SECURITY: Secrets are passed as environment variables.
          # They are masked in logs — GitHub Actions redacts any value
          # that matches a secret, even if accidentally printed.
          OPENAI_API_KEY: ${{ secrets.TEST_OPENAI_API_KEY }}
          ORCHESTRATOR_PORT: "8000"
          ECHO_AGENT_PORT: "8001"
          SEARCH_AGENT_PORT: "8002"

      - name: Wait for Orchestrator health check
        run: |
          # Poll the health endpoint until it responds or we time out.
          # This is more reliable than a fixed sleep.
          for i in {1..15}; do
            if curl -sf http://localhost:8000/health; then
              echo "✅ Orchestrator is healthy"
              break
            fi
            echo "Attempt $i/15: Orchestrator not ready yet, waiting..."
            sleep 2
          done

      - name: Run integration tests
        working-directory: starter-project/python
        run: |
          TARGET="${{ github.event.inputs.target_agent }}"
          if [ -n "$TARGET" ]; then
            pytest tests/integration/ -k "$TARGET" -v
          else
            pytest tests/integration/ -v
          fi
        env:
          ORCHESTRATOR_URL: "http://localhost:8000"

      # If any previous step failed, dump the service logs so we
      # can diagnose what went wrong. `if: failure()` ensures this
      # step ONLY runs when something broke.
      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "=== Orchestrator Log ==="
          cat /tmp/orchestrator.log || echo "(no log)"
          echo "=== Echo Agent Log ==="
          cat /tmp/agent-echo.log || echo "(no log)"
          echo "=== Search Agent Log ==="
          cat /tmp/agent-search.log || echo "(no log)"

  # ──────────────────────────────────────────────────────────
  # JOB 2: Integration Tests — Node.js
  # Same tests, different runtime. Ensures both starter
  # project variants stay in sync.
  # ──────────────────────────────────────────────────────────
  integration-nodejs:
    name: Integration Tests (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238  # v6.2.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: starter-project/nodejs/package-lock.json

      - name: Install dependencies
        working-directory: starter-project/nodejs
        run: npm ci

      - name: Start the A2A system in the background
        working-directory: starter-project/nodejs
        run: |
          node orchestrator/index.js > /tmp/orchestrator-node.log 2>&1 &
          node agents/echo/index.js  > /tmp/agent-echo-node.log  2>&1 &
          node agents/search/index.js > /tmp/agent-search-node.log 2>&1 &
          sleep 5
        env:
          OPENAI_API_KEY: ${{ secrets.TEST_OPENAI_API_KEY }}
          ORCHESTRATOR_PORT: "9000"
          ECHO_AGENT_PORT: "9001"
          SEARCH_AGENT_PORT: "9002"

      - name: Wait for Orchestrator health check
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:9000/health; then
              echo "✅ Orchestrator is healthy"
              break
            fi
            sleep 2
          done

      - name: Run integration tests
        working-directory: starter-project/nodejs
        run: npm run test:integration
        env:
          ORCHESTRATOR_URL: "http://localhost:9000"

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "=== Orchestrator Log ==="
          cat /tmp/orchestrator-node.log || echo "(no log)"
          echo "=== Echo Agent Log ==="
          cat /tmp/agent-echo-node.log || echo "(no log)"

  # ──────────────────────────────────────────────────────────
  # JOB 3: Open a GitHub Issue on Failure
  # If nightly tests fail, automatically open an issue to
  # alert maintainers. This demonstrates the `gh` CLI and
  # the `issues: write` permission in a real-world context.
  # ──────────────────────────────────────────────────────────
  notify-on-failure:
    name: Open Issue on Failure
    runs-on: ubuntu-latest
    needs:
      - integration-python
      - integration-nodejs
    # Only run this job if a previous job actually failed
    # AND this is a scheduled run (not a manual trigger or push).
    # We don't want to spam issues on every failed manual run.
    if: |
      failure() &&
      github.event_name == 'schedule'
    permissions:
      issues: write

    steps:
      - name: Create failure issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Nightly integration tests failed — ${today}`,
              body: [
                '## Nightly Integration Test Failure',
                '',
                'The nightly integration test run failed. This likely means a recent change',
                'broke compatibility between the Orchestrator and one or more Specialist Agents.',
                '',
                `**Failed run:** ${runUrl}`,
                `**Date:** ${today}`,
                '',
                '## Next Steps',
                '1. Review the failed run logs at the link above',
                '2. Identify which agent or integration point is broken',
                '3. Open a fix PR referencing this issue',
                '',
                '/cc @maintainers',
              ].join('\n'),
              labels: ['integration-failure', 'bug', 'needs-triage'],
            });
