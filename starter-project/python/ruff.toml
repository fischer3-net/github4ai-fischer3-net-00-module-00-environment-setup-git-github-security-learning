# ruff.toml
# Ruff configuration — linter + formatter for the Python starter project.
# CI runs `ruff check` and `ruff format --check` on every PR.

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "S",    # flake8-bandit (security)
    "UP",   # pyupgrade
]
ignore = [
    "S101",   # assert used — fine in test files
    "S104",   # binding to 0.0.0.0 — expected for FastAPI in containers
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S105"]   # Allow assert and hardcoded passwords in tests
