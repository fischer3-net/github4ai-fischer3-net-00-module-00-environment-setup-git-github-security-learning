# ============================================================
# Pages — Deploy Course Documentation to GitHub Pages
# ============================================================
#
# MODULE 08 TEACHING REFERENCE — Packages, Releases & Pages
# This workflow builds the Starlight (Astro) documentation
# site and deploys it to GitHub Pages.
#
# How to enable GitHub Pages for your repo:
#   Repository Settings → Pages → Source → GitHub Actions
#
# The live site will be available at:
#   https://[your-org].github.io/github-for-ai-builders/
# ============================================================

name: Deploy Docs to Pages

on:
  push:
    branches:
      - main
    # Only re-deploy when documentation source files change.
    # A starter-project code fix alone won't trigger a rebuild.
    paths:
      - "docs/src/**"
      - "docs/astro.config.mjs"
      - "docs/package.json"
      - "docs/package-lock.json"
      - ".github/workflows/pages.yml"

  # Allow manual re-deployment from the Actions tab
  workflow_dispatch:

# SECURITY: Minimum permissions for GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write   # Required for the official Pages deployment action

# Only one Pages deployment at a time.
# Unlike CI, we don't cancel in-progress deployments —
# a half-deployed docs site is worse than waiting.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  # ──────────────────────────────────────────────────────────
  # JOB 1: Build
  # Installs dependencies and runs `astro build` to produce
  # a static site in the `docs/_site/` directory.
  # ──────────────────────────────────────────────────────────
  build:
    name: Build Starlight Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # Fetch full git history so Starlight can show accurate
          # "Last updated" dates on each module page.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: npm
          # Cache key scoped to the docs package-lock, not the
          # root or starter-project lockfiles
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        # `npm ci` installs exact versions from the lockfile —
        # more reliable than `npm install` in CI environments
        run: npm ci

      - name: Configure GitHub Pages
        # Detects the repository name and sets the correct
        # `base` path automatically — no hardcoding needed
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5.0.0
        id: pages

      - name: Build with Astro
        working-directory: docs
        run: npm run build
        env:
          # Pass the detected site URL to Astro so the base
          # path is set correctly in the built output
          SITE: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1
        with:
          # Astro outputs to `dist/` by default
          path: docs/dist

  # ──────────────────────────────────────────────────────────
  # JOB 2: Deploy
  # Takes the built artifact and publishes it to GitHub Pages.
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
